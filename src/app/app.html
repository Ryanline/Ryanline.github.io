<div class="page-shell">
  <header class="site-header">
    <a class="brand" routerLink="/" aria-label="Ryan Brooks home">RB</a>

    <nav class="site-nav" aria-label="Primary">
      @for (item of navItems; track item.label) {
        <a
          [routerLink]="item.route"
          [fragment]="item.fragment"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route !== '/' || !item.fragment }"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </header>

  <main class="route-shell">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <p class="footer-year">© {{ currentYear }} Ryan Brooks</p>

    <div class="footer-links">
      @for (link of socialLinks; track link.label) {
        <a [href]="link.href" [attr.target]="link.href.startsWith('mailto:') ? null : '_blank'" rel="noopener">
          {{ link.label }}
        </a>
      }
    </div>
  </footer>
</div>
